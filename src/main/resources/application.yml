spring:
  application:
    name: hexlet-spring-blog
#  datasource:
#    url: jdbc:postgresql://localhost:5432/hexlet_spring_blog
#    username: postgres
#    password: password
  datasource:
    url: jdbc:h2:mem:hexlet-spring-blog
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
output:
  ansi:
  enabled: always    # цветной вывод логотипа
logging:
  pattern:
    dateformat: "yyyy-MM-dd HH:mm:ss"  # кастомный формат даты в логах
app:
  welcome-message: "Welcome to Spring blog!"  # наше кастомное сообщение
